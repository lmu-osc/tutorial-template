on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * 0"
  push:
    branches: main

name: Quarto Publish

jobs:
  quarto-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R with renv
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
        if: ${{ hashFiles('renv.lock') != '' }}

      - name: Install R Dependencies with renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1
        if: ${{ hashFiles('renv.lock') != '' }}

      - name: Install R latest
        uses: r-lib/actions/setup-r@v2
        if: ${{ hashFiles('renv.lock') == '' }}

      - name: Install R latest dependencies with pak
        run: |
          install.packages("pak")
          install.packages("renv")
          deps <- unique(stats::na.omit(renv::dependencies()$Package))
          pkgs <- unique(c("rmarkdown", "yaml", deps))
          pak::pkg_install(pkgs, dependencies = TRUE)
        shell: Rscript {0}
        if: ${{ hashFiles('renv.lock') == '' }}

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
