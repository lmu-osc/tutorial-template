name: Link Checker

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Check links
        uses: filiph/linkcheck@3.0.0
        with:
            arguments: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/