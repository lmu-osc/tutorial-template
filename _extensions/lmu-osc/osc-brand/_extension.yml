title: osc-brand
author: Patrick Callahan
version: 1.0.0
quarto-required: '>=1.9.0'
source: lmu-osc/osc-brand
source-type: github
contributes:
  formats:
    html:
      theme:
        light:
          - flatly
          - brand
          - lmu-osc-custom.scss
        dark:
          - darkly
          - brand
          - lmu-osc-custom.scss
    html+tutorial:
      theme:
        light:
          - flatly
          - brand
          - lmu-osc-custom.scss
        dark:
          - darkly
          - brand
          - lmu-osc-custom.scss
      toc: true
      toc-title: ' '
      code-tools: true
      code-overflow: wrap
      code-link: true
      logo: small
      smooth-scroll: true
      footnotes-hover: true
      repo-actions:
        - edit
        - source
        - true
      grid:
        sidebar-width: 300px
  metadata:
    project:
      brand: brand.yml
