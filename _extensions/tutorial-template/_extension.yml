title: tutorial-template
author: Patrick Callahan
description: A template website for the LMU Open Science Center's tutorials
version: 1.0.0
quarto-required: ">=1.9.0"
contributes:
  # metadata:
  #   project:
  #     brand: brand.yml
  project:
    project:
      type: website
    website:
      search:
        location: sidebar
      repo-actions: [edit, issue]
      back-to-top-navigation: true
      page-navigation: true
      # favicon: small
      reader-mode: true
      # navbar:
      #   background: primary
      #   logo: small
    format: tutorial-template-html
  formats:
    html:
      theme:
        light: [flatly, brand, lmu-osc-custom.scss]
        dark: [darkly, brand, lmu-osc-custom.scss]
      toc: true
      toc-title: " "
      code-tools: true
      code-overflow: wrap
      code-link: true
      logo: small
      smooth-scroll: true
      footnotes-hover: true
      repo-actions: [edit, source, issue] # only works in conjunction with a repo-url being set
      grid:
        sidebar-width: 300px
