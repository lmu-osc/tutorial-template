# Begin Project
project:
  type: website
# End Project


# Begin Website
website:
  title: "TUTORIAL TITLE HERE"
  page-footer: 
    border: false
  search:
    location: sidebar
  repo-url: https://github.com/lmu-osc/REPO-NAME-HERE
  repo-actions: [edit, issue]
  back-to-top-navigation: true
  page-navigation: true
  favicon: assets/lmu-osc-favicon.jpg
  margin-header: |
    ![](/assets/lmu-osc-logo.svg){width="175"}
  
  
  navbar:
    right: 
      - about.qmd
    left:
      - href: index.qmd
        text: Home
    tools:
      - icon: github
        menu:
          - text: Source Code
            url:  https://github.com/lmu-osc/REPO-NAME-HERE
          - text: Report a Bug
            url:  https://github.com/lmu-osc/REPO-NAME-HERE/issues
      - icon: house-heart
        url: https://www.osc.lmu.de/
   
        
  sidebar:
    style: "docked"
    contents:
      - text: "Overview"
        href: index.qmd
      - section: "TOPIC 1"
        href: topic-one/index.qmd
        contents:
          - href: topic-one/page-one.qmd
            text: Example of Overriden Title # You can override the page title here if you want to, otherwise it will use the page title from the qmd file
          - href: topic-one/page-two.qmd
            # text: "topic-one Page 2 Title"
      - section: "TOPIC 2"
        href: topic-two/index.qmd
        contents:
          - href: topic-two/page-one.qmd
            # text: "topic-two Page 1 Title"
          - href: topic-two/page-two.qmd
            # text: "topic-two Page 2 Title"
          - href: topic-two/page-three.qmd
            # text: "topic-two Page 3 Title"
# End Website


# Begin Format
format:
  html:
    theme: 
      - cosmo
      - lmu-osc-custom.scss
    css: 
      - https://raw.githubusercontent.com/lmu-osc/branding-resources/refs/heads/main/lmu-osc-styles.css
    toc: true
    fontsize: 13pt
    code-overflow: wrap
    code-link: true
    grid:
      sidebar-width: 300px
    include-in-header:
      - file: matomo-analytics.html
# End Format

# Begin Editor
editor: source
# End Editor
